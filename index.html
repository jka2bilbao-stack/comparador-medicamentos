<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comparador de medicamentos en Madrid</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="toolbar">
        <div>
          <p class="eyebrow">Precios medicamentos</p>
          <h1>Dra. Judith Morraja</h1>
          <p class="subtitle">
            Acceso a precio orientativo online.
          </p>
        </div>
        <button id="refreshBtn" type="button">Actualizar ahora</button>
      </section>

      <section class="controls" aria-label="Filtros">
        <label>
          Medicamento
          <select id="medicineSelect"></select>
        </label>
        <label class="checkbox">
          <input id="commercialOnly" type="checkbox" checked />
          Solo comercializados
        </label>
      </section>

      <section class="summary-grid">
        <article>
          <span id="countStat">0</span>
          <p>presentaciones encontradas</p>
        </article>
        <article>
          <span id="updatedStat">Sin actualizar</span>
          <p>última consulta</p>
        </article>
      </section>

      <section class="results-header">
        <h2>Presentaciones</h2>
        <div class="quick-links">
          <a id="mapsLink" target="_blank" rel="noreferrer">Farmacias cercanas</a>
        </div>
      </section>

      <section id="status" class="status" role="status">Cargando datos...</section>
      <section id="cards" class="cards" aria-live="polite"></section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
